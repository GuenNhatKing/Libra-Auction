databaseChangeLog:
  - changeSet:
      id: init-database-schema
      author: nhatking
      changes:
        - createTable:
            tableName: role
            columns:
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: role_pkey
              - column:
                  name: description
                  type: VARCHAR(255)

        - createTable:
            tableName: category
            columns:
              - column:
                  name: id
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: category_pkey
              - column:
                  name: name
                  type: VARCHAR(255)
              - column:
                  name: image_url
                  type: VARCHAR(255)

        - createTable:
            tableName: standardized_attribute
            columns:
              - column:
                  name: id
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: standardized_attribute_pkey
              - column:
                  name: attribute_name
                  type: VARCHAR(255)
              - column:
                  name: attribute_value
                  type: VARCHAR(255)

        - createTable:
            tableName: customer
            columns:
              - column:
                  name: id
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: customer_pkey
              - column:
                  name: role_name
                  type: VARCHAR(255)
              - column:
                  name: full_name
                  type: VARCHAR(255)
              - column:
                  name: email
                  type: VARCHAR(255)
              - column:
                  name: phone_number
                  type: VARCHAR(255)
              - column:
                  name: identity_number
                  type: VARCHAR(255)
              - column:
                  name: avatar_url
                  type: VARCHAR(255)
              - column:
                  name: account_status
                  type: VARCHAR(255)
              - column:
                  name: email_status
                  type: VARCHAR(255)
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE

        - createTable:
            tableName: account
            columns:
              - column:
                  name: id
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: account_pkey
              - column:
                  name: customer_id
                  type: VARCHAR(255)
              - column:
                  name: status
                  type: VARCHAR(255)

        - createTable:
            tableName: account_password
            columns:
              - column:
                  name: id
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: account_password_pkey
              - column:
                  name: username
                  type: VARCHAR(255)
              - column:
                  name: password_hash
                  type: VARCHAR(255)
              - column:
                  name: salt
                  type: BYTEA

        - createTable:
            tableName: account_oauth
            columns:
              - column:
                  name: id
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: account_oauth_pkey
              - column:
                  name: provider
                  type: VARCHAR(255)
              - column:
                  name: provider_id
                  type: VARCHAR(255)

        - createTable:
            tableName: product
            columns:
              - column:
                  name: id
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: product_pkey
              - column:
                  name: category_id
                  type: VARCHAR(255)
              - column:
                  name: creator_id
                  type: VARCHAR(255)
              - column:
                  name: name
                  type: VARCHAR(255)
              - column:
                  name: quantity
                  type: INTEGER
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: status
                  type: VARCHAR(20)
                  defaultValue: "AVAILABLE"
                  constraints:
                    nullable: false
              - column:
                  name: root_product_id
                  type: VARCHAR(255)
                  constraints:
                    nullable: true
              - column:
                  name: version_created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: latest_version
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: deleted
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: deleted_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: true

        - createTable:
            tableName: product_image
            columns:
              - column:
                  name: id
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: product_image_pkey
              - column:
                  name: product_id
                  type: VARCHAR(255)
              - column:
                  name: image_url
                  type: VARCHAR(255)
              - column:
